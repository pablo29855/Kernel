name: Build ChicKernel

on:
  workflow_dispatch:
    inputs:
      variant:
        description: 'Build Variant'
        required: true
        default: 'ksun'
        type: choice
        options:
        - standard
        - ksun
        - ksun-susfs

jobs:
  build:
    runs-on: ubuntu-24.04
    
    steps:
    - name: Checkout Kernel Source
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 1

    - name: Setup Build Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32ncurses5-dev lib32readline-dev lib32z1-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3
        
    - name: Download Clang Toolchain
      run: |
        mkdir -p tc
        cd tc
        wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/master/clang-r522817.tar.gz
        tar -xf clang-r522817.tar.gz
        cd ..
        
    - name: Setup KernelSU-Next
      if: contains(github.event.inputs.variant, 'ksun')
      run: |
        git clone https://github.com/rifsxd/KernelSU-Next.git -b next KernelSU-Next
        ln -sf ../KernelSU-Next/kernel drivers/kernelsu
        
    - name: Build Kernel
      env:
        VARIANT: ${{ github.event.inputs.variant }}
      run: |
        export PATH=$(pwd)/tc/bin:$PATH
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
        
        # Determine config based on variant
        if [ "$VARIANT" = "standard" ]; then
          DEFCONFIG="chickernel_defconfig"
        elif [ "$VARIANT" = "ksun" ]; then
          DEFCONFIG="chickernel_defconfig chickernel-variants/ksun.config"
        elif [ "$VARIANT" = "ksun-susfs" ]; then
          DEFCONFIG="chickernel_defconfig chickernel-variants/ksun.susfs.config"
        fi
        
        # Clean build directory
        make O=out ARCH=arm64 clean
        make O=out ARCH=arm64 mrproper
        
        # Generate config
        make O=out ARCH=arm64 CC=clang $DEFCONFIG
        
        # Build
        make -j$(nproc --all) O=out ARCH=arm64 CC=clang \
                            CROSS_COMPILE=aarch64-linux-gnu- \
                            CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
                            LLVM=1 LLVM_IAS=1
                            
    - name: Package with AnyKernel3
      run: |
        git clone https://github.com/osm0sis/AnyKernel3.git -b master AnyKernel3
        cp out/arch/arm64/boot/Image AnyKernel3/
        # Check if dtbo.img exists and copy if it does
        if [ -f out/arch/arm64/boot/dtbo.img ]; then
          cp out/arch/arm64/boot/dtbo.img AnyKernel3/
        fi
        cd AnyKernel3
        sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh
        zip -r9 ../ChicKernel-${{ github.event.inputs.variant }}-tapas.zip *
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ChicKernel-${{ github.event.inputs.variant }}
        path: ChicKernel-*-tapas.zip
